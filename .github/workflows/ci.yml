name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Typecheck and Lint
        run: npm run check
        
      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
          
      - name: Run Lua Tests
        run: nvim --headless --cmd "set rtp+=." -l tests/test_path.lua
